<svg xmlns="http://www.w3.org/2000/svg" width="660" height="380" viewBox="0 0 660 380">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a2a0f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#162e0d;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6b3a;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#0a2a0f;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="660" height="380" fill="url(#bg)"/>
  <ellipse cx="330" cy="0" rx="400" ry="200" fill="url(#sky)"/>
  <!-- Soil -->
  <rect x="0" y="290" width="660" height="90" fill="#3d2008" opacity="0.7"/>
  <!-- Stems -->
  <line x1="150" y1="290" x2="150" y2="180" stroke="#22c55e" stroke-width="6"/>
  <line x1="280" y1="290" x2="280" y2="150" stroke="#22c55e" stroke-width="6"/>
  <line x1="380" y1="290" x2="380" y2="160" stroke="#22c55e" stroke-width="6"/>
  <line x1="510" y1="290" x2="510" y2="185" stroke="#22c55e" stroke-width="6"/>
  <!-- Leaves -->
  <ellipse cx="120" cy="200" rx="40" ry="18" fill="#16a34a" opacity="0.85" transform="rotate(-20,120,200)"/>
  <ellipse cx="182" cy="190" rx="38" ry="16" fill="#16a34a" opacity="0.85" transform="rotate(15,182,190)"/>
  <ellipse cx="250" cy="170" rx="42" ry="18" fill="#16a34a" opacity="0.85" transform="rotate(-25,250,170)"/>
  <ellipse cx="315" cy="162" rx="40" ry="18" fill="#16a34a" opacity="0.85" transform="rotate(20,315,162)"/>
  <ellipse cx="355" cy="178" rx="38" ry="16" fill="#16a34a" opacity="0.85" transform="rotate(-18,355,178)"/>
  <ellipse cx="412" cy="170" rx="40" ry="17" fill="#16a34a" opacity="0.85" transform="rotate(22,412,170)"/>
  <ellipse cx="480" cy="200" rx="40" ry="18" fill="#16a34a" opacity="0.85" transform="rotate(-20,480,200)"/>
  <ellipse cx="542" cy="193" rx="38" ry="16" fill="#16a34a" opacity="0.85" transform="rotate(15,542,193)"/>
  <!-- Water drops -->
  <ellipse cx="200" cy="100" rx="5"  cy2="8"  ry="8"  fill="#60a5fa" opacity="0.8"/>
  <ellipse cx="330" cy="80"  rx="4"  ry="7"  fill="#60a5fa" opacity="0.7"/>
  <ellipse cx="450" cy="95"  rx="5"  ry="8"  fill="#60a5fa" opacity="0.8"/>
  <text x="200" y="108" font-size="14" text-anchor="middle" fill="#60a5fa" opacity="0.9">💧</text>
  <text x="330" y="90"  font-size="14" text-anchor="middle" fill="#60a5fa" opacity="0.9">💧</text>
  <text x="460" y="103" font-size="14" text-anchor="middle" fill="#60a5fa" opacity="0.9">💧</text>
  <!-- Sensor box -->
  <rect x="295" y="258" width="70" height="36" rx="8" fill="#f59e0b" opacity="0.85"/>
  <text x="330" y="281" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a" font-family="sans-serif">SENSOR</text>
  <!-- Label -->
  <rect x="185" y="316" width="290" height="50" rx="12" fill="#ffffff14"/>
  <text x="330" y="342" font-size="15" font-weight="bold" text-anchor="middle" fill="white" font-family="sans-serif">Auto Irrigation System</text>
  <text x="330" y="359" font-size="11" text-anchor="middle" fill="#ffffffaa" font-family="sans-serif">Soil Moisture Based Smart Watering</text>
</svg>
