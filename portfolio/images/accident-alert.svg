<svg xmlns="http://www.w3.org/2000/svg" width="660" height="380" viewBox="0 0 660 380">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c0a0a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3b0d0d;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="660" height="380" fill="url(#bg)"/>
  <!-- Glow -->
  <ellipse cx="330" cy="190" rx="220" ry="180" fill="url(#glow)"/>
  <!-- Road -->
  <rect x="0" y="240" width="660" height="80" fill="#222" opacity="0.8"/>
  <line x1="0" y1="280" x2="660" y2="280" stroke="#ffff0060" stroke-width="3" stroke-dasharray="30,20"/>
  <!-- Car silhouette -->
  <rect x="220" y="200" width="220" height="70" rx="14" fill="#333" stroke="#ef4444" stroke-width="2"/>
  <rect x="255" y="183" width="150" height="40" rx="10" fill="#444"/>
  <circle cx="265" cy="280" r="22" fill="#111" stroke="#555" stroke-width="3"/>
  <circle cx="265" cy="280" r="10" fill="#333"/>
  <circle cx="395" cy="280" r="22" fill="#111" stroke="#555" stroke-width="3"/>
  <circle cx="395" cy="280" r="10" fill="#333"/>
  <!-- Alert signal rings -->
  <circle cx="330" cy="130" r="20" fill="none" stroke="#ef4444" stroke-width="3" opacity="0.9"/>
  <circle cx="330" cy="130" r="36" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.5"/>
  <circle cx="330" cy="130" r="52" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.25"/>
  <text x="330" y="138" font-size="16" text-anchor="middle" fill="#ef4444">🚨</text>
  <!-- Label -->
  <rect x="160" y="318" width="340" height="48" rx="12" fill="#ffffff12"/>
  <text x="330" y="344" font-size="14" font-weight="bold" text-anchor="middle" fill="white" font-family="sans-serif">Accident Alert System</text>
  <text x="330" y="360" font-size="10" text-anchor="middle" fill="#ffffffaa" font-family="sans-serif">Vehicle Safety &amp; Emergency Alert Device</text>
</svg>
