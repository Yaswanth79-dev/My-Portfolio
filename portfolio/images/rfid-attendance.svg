<svg xmlns="http://www.w3.org/2000/svg" width="660" height="380" viewBox="0 0 660 380">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a2a4a;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="660" height="380" fill="url(#bg)"/>
  <!-- Scan lines -->
  <line x1="0" y1="60"  x2="660" y2="60"  stroke="#3a6bff15" stroke-width="1"/>
  <line x1="0" y1="120" x2="660" y2="120" stroke="#3a6bff15" stroke-width="1"/>
  <line x1="0" y1="180" x2="660" y2="180" stroke="#3a6bff15" stroke-width="1"/>
  <line x1="0" y1="240" x2="660" y2="240" stroke="#3a6bff15" stroke-width="1"/>
  <line x1="0" y1="300" x2="660" y2="300" stroke="#3a6bff15" stroke-width="1"/>
  <!-- ID Card -->
  <rect x="185" y="80" width="290" height="185" rx="16" fill="#1e3a6e" stroke="#3a6bff" stroke-width="2"/>
  <rect x="185" y="80" width="290" height="50"  rx="16" fill="#3a6bff" opacity="0.8"/>
  <!-- RFID chip -->
  <rect x="215" y="155" width="55" height="44" rx="6" fill="#f59e0b" opacity="0.9"/>
  <line x1="232" y1="162" x2="252" y2="162" stroke="#b45309" stroke-width="1.5"/>
  <line x1="232" y1="170" x2="252" y2="170" stroke="#b45309" stroke-width="1.5"/>
  <line x1="232" y1="178" x2="252" y2="178" stroke="#b45309" stroke-width="1.5"/>
  <line x1="232" y1="186" x2="252" y2="186" stroke="#b45309" stroke-width="1.5"/>
  <!-- Card text lines -->
  <rect x="290" y="160" width="140" height="10" rx="4" fill="#ffffff30"/>
  <rect x="290" y="180" width="100" height="8"  rx="4" fill="#ffffff20"/>
  <rect x="290" y="198" width="120" height="8"  rx="4" fill="#ffffff20"/>
  <text x="330" y="115" font-size="13" font-weight="bold" text-anchor="middle" fill="white" font-family="sans-serif">STUDENT ID</text>
  <!-- Scan beam -->
  <rect x="185" y="186" width="290" height="3" fill="#22c55e" opacity="0.85"/>
  <rect x="185" y="183" width="290" height="9" fill="#22c55e" opacity="0.18"/>
  <!-- Check mark -->
  <circle cx="490" cy="140" r="26" fill="#22c55e30" stroke="#22c55e" stroke-width="2"/>
  <text x="490" y="149" font-size="18" text-anchor="middle" fill="#22c55e">✓</text>
  <!-- Label -->
  <rect x="185" y="292" width="290" height="54" rx="12" fill="#ffffff12"/>
  <text x="330" y="320" font-size="15" font-weight="bold" text-anchor="middle" fill="white" font-family="sans-serif">RFID Smart Attendance</text>
  <text x="330" y="338" font-size="11" text-anchor="middle" fill="#ffffffaa" font-family="sans-serif">Real-time Entry/Exit Tracking System</text>
</svg>
