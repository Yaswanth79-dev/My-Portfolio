<svg xmlns="http://www.w3.org/2000/svg" width="660" height="380" viewBox="0 0 660 380">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a6b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d5e3f;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a6bff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0.6"/>
    </linearGradient>
  </defs>
  <rect width="660" height="380" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="0" y1="95" x2="660" y2="95" stroke="#ffffff08" stroke-width="1"/>
  <line x1="0" y1="190" x2="660" y2="190" stroke="#ffffff08" stroke-width="1"/>
  <line x1="0" y1="285" x2="660" y2="285" stroke="#ffffff08" stroke-width="1"/>
  <line x1="165" y1="0" x2="165" y2="380" stroke="#ffffff08" stroke-width="1"/>
  <line x1="330" y1="0" x2="330" y2="380" stroke="#ffffff08" stroke-width="1"/>
  <line x1="495" y1="0" x2="495" y2="380" stroke="#ffffff08" stroke-width="1"/>
  <!-- Roads -->
  <rect x="290" y="0" width="80" height="380" fill="#ffffff07"/>
  <rect x="0" y="170" width="660" height="40" fill="#ffffff07"/>
  <!-- Buildings -->
  <rect x="60" y="80" width="70" height="110" fill="#3a6bff" opacity="0.7" rx="4"/>
  <rect x="150" y="50" width="55" height="130" fill="#22c55e" opacity="0.6" rx="4"/>
  <rect x="420" y="70" width="80" height="120" fill="#3a6bff" opacity="0.7" rx="4"/>
  <rect x="520" y="90" width="60" height="100" fill="#22c55e" opacity="0.5" rx="4"/>
  <!-- Map pin -->
  <circle cx="330" cy="155" r="28" fill="url(#glow)" opacity="0.9"/>
  <text x="330" y="163" font-size="22" text-anchor="middle" fill="white">📍</text>
  <!-- Label -->
  <rect x="190" y="280" width="280" height="52" rx="12" fill="#ffffff15"/>
  <text x="330" y="308" font-size="15" font-weight="bold" text-anchor="middle" fill="white" font-family="sans-serif">Civic Seva</text>
  <text x="330" y="326" font-size="11" text-anchor="middle" fill="#ffffffaa" font-family="sans-serif">Smart Civic Issue Reporting Platform</text>
</svg>
